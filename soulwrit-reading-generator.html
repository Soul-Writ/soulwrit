<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soulwrit — Reading Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0B0912;--deep:#141020;--violet:#241B38;--violet-light:#332648;
  --gold:#D4AF6A;--gold-light:#F3D9A4;--gold-deep:#B8863E;
  --cream:#EDE8DC;--muted:#9C93B0;--border:rgba(212,175,106,0.18);--sage:#8FAE94;
}
body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;padding:40px 20px;line-height:1.6;}
.container{max-width:740px;margin:0 auto;}
h1{font-family:'Fraunces',serif;font-weight:300;font-size:32px;margin-bottom:6px;color:var(--gold-light);font-style:italic;}
.subtitle{font-size:13.5px;color:var(--muted);margin-bottom:32px;font-weight:300;}

.form-card{background:var(--deep);border:1px solid var(--border);border-radius:4px;padding:32px;margin-bottom:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:10.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.form-group input,.form-group select{padding:12px 14px;border:1px solid var(--border);border-radius:2px;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--cream);background:var(--ink);outline:none;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--gold);}

.plan-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;}
.plan-pill{border:1px solid var(--border);border-radius:2px;padding:11px;text-align:center;cursor:pointer;transition:all 0.2s;}
.plan-pill.active{border-color:var(--gold);background:var(--violet);}
.plan-pill span{font-size:12px;font-weight:500;color:var(--muted);display:block;}
.plan-pill.active span{color:var(--gold-light);}

.btn-generate{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold-light),var(--gold-deep));color:var(--ink);border:none;border-radius:2px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-generate:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,175,106,0.3);}
.btn-generate:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.loading{display:none;text-align:center;padding:50px;color:var(--muted);font-size:14.5px;font-weight:300;}
.loading.visible{display:block;}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

.reading-output{display:none;}
.reading-output.visible{display:block;}
.reading-card{background:var(--deep);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:16px;}
.reading-header{background:linear-gradient(135deg,var(--violet),var(--violet-light));padding:26px 30px;border-bottom:1px solid var(--border);}
.reading-meta{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.meta-pill{background:rgba(212,175,106,0.15);border:1px solid var(--border);border-radius:2px;padding:4px 11px;font-size:11px;font-weight:500;color:var(--gold-light);letter-spacing:0.03em;}
.reading-header h2{font-family:'Fraunces',serif;font-size:23px;font-weight:400;font-style:italic;line-height:1.35;color:var(--cream);}
.reading-body{padding:26px 30px;}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.horoscope-text{font-size:14.5px;font-weight:300;color:var(--cream);opacity:0.85;line-height:1.8;margin-bottom:26px;}
.numerology-block{display:flex;gap:16px;align-items:flex-start;margin-bottom:26px;padding:18px;background:var(--violet);border-radius:2px;}
.num-badge{width:46px;height:46px;border-radius:2px;background:linear-gradient(135deg,var(--gold-light),var(--gold-deep));display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:22px;color:var(--ink);flex-shrink:0;}
.num-content h4{font-size:12.5px;color:var(--gold-light);margin-bottom:5px;font-weight:500;}
.num-content p{font-size:13px;color:var(--muted);line-height:1.65;}
.journal-block{background:rgba(143,174,148,0.08);border-left:2px solid var(--sage);border-radius:0 2px 2px 0;padding:18px;margin-bottom:26px;}
.journal-block .j-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage);margin-bottom:8px;}
.journal-block p{font-family:'Fraunces',serif;font-size:17px;font-style:italic;color:var(--cream);line-height:1.4;}

.premium-section{border-top:1px solid var(--border);padding-top:22px;margin-top:4px;}
.premium-badge-inline{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--gold-light),var(--gold-deep));color:var(--ink);font-size:10.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:2px;margin-bottom:16px;}
.moon-block{background:var(--ink);border:1px solid var(--border);border-radius:2px;padding:18px;margin-bottom:14px;}
.moon-block h4{font-size:12.5px;font-weight:500;color:var(--gold-light);margin-bottom:6px;}
.moon-block p{font-size:13px;font-weight:300;color:var(--muted);line-height:1.65;}
.compatibility-block{background:var(--ink);border:1px solid var(--border);border-radius:2px;padding:18px;}
.compatibility-block h4{font-size:12.5px;font-weight:500;color:var(--cream);margin-bottom:6px;}
.compatibility-block p{font-size:13px;font-weight:300;color:var(--muted);line-height:1.65;}
.compat-signs{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.compat-pill{background:var(--violet);color:var(--gold-light);font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:2px;}

.email-preview-card{background:var(--deep);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:16px;}
.email-preview-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.email-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}
.email-preview-header span{font-size:12.5px;color:var(--muted);}
.email-preview-header strong{font-size:12.5px;color:var(--cream);}
.email-body-preview{padding:24px;font-size:13.5px;line-height:1.8;color:var(--muted);font-weight:300;}
.email-body-preview .email-subject{font-family:'Fraunces',serif;font-size:19px;font-style:italic;font-weight:400;color:var(--gold-light);margin-bottom:16px;}

.action-row{display:flex;gap:12px;margin-top:16px;}
.btn-secondary{flex:1;padding:12px;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;text-align:center;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-light);}
.btn-copy{flex:1;padding:12px;border:none;border-radius:2px;background:linear-gradient(135deg,var(--gold-light),var(--gold-deep));color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn-copy:hover{transform:translateY(-1px);}

.error-msg{background:rgba(200,80,80,0.1);border:1px solid rgba(200,80,80,0.3);border-radius:2px;padding:14px 18px;font-size:13.5px;color:#E08585;display:none;margin-bottom:16px;}
.error-msg.visible{display:block;}

@media (max-width:600px){.form-row{grid-template-columns:1fr;}.plan-row{grid-template-columns:1fr;}.reading-header{padding:20px;}.reading-body{padding:20px;}}
</style>
</head>
<body>
<div class="container">
  <h1>Reading Generator</h1>
  <p class="subtitle">Internal tool — generate a personalized daily reading for any subscriber.</p>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group"><label>First name</label><input type="text" id="name" placeholder="e.g. Maya" value="Maya"/></div>
      <div class="form-group"><label>Date of birth</label><input type="date" id="dob" value="1992-09-14"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Reading date</label><input type="date" id="readingDate"/></div>
      <div class="form-group">
        <label>Timezone</label>
        <select id="timezone">
          <option value="Mountain Time">Mountain Time (Edmonton)</option>
          <option value="Pacific Time">Pacific Time</option>
          <option value="Central Time">Central Time</option>
          <option value="Eastern Time">Eastern Time</option>
          <option value="Atlantic Time">Atlantic Time</option>
          <option value="UTC">UTC</option>
        </select>
      </div>
    </div>
    <p style="font-size:10.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Subscription plan</p>
    <div class="plan-row">
      <div class="plan-pill active" id="pill-monthly" onclick="setPlan('monthly')"><span>Monthly $4.99</span></div>
      <div class="plan-pill" id="pill-annual" onclick="setPlan('annual')"><span>Annual $39</span></div>
      <div class="plan-pill" id="pill-premium" onclick="setPlan('premium')"><span>Premium $9.99</span></div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-generate" id="generateBtn" onclick="generateReading()"><span>✦</span> Generate Reading</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div>Writing your reading...</div>
  <div class="reading-output" id="output"></div>
</div>

<script>
let selectedPlan='monthly';
const today=new Date();
document.getElementById('readingDate').value=today.toISOString().split('T')[0];

function setPlan(plan){
  selectedPlan=plan;
  ['monthly','annual','premium'].forEach(p=>document.getElementById('pill-'+p).classList.toggle('active',p===plan));
}

function getZodiacSign(dob){
  const date=new Date(dob),month=date.getUTCMonth()+1,day=date.getUTCDate();
  const signs=[{sign:'Capricorn',symbol:'♑',end:[1,19]},{sign:'Aquarius',symbol:'♒',end:[2,18]},{sign:'Pisces',symbol:'♓',end:[3,20]},{sign:'Aries',symbol:'♈',end:[4,19]},{sign:'Taurus',symbol:'♉',end:[5,20]},{sign:'Gemini',symbol:'♊',end:[6,20]},{sign:'Cancer',symbol:'♋',end:[7,22]},{sign:'Leo',symbol:'♌',end:[8,22]},{sign:'Virgo',symbol:'♍',end:[9,22]},{sign:'Libra',symbol:'♎',end:[10,22]},{sign:'Scorpio',symbol:'♏',end:[11,21]},{sign:'Sagittarius',symbol:'♐',end:[12,21]},{sign:'Capricorn',symbol:'♑',end:[12,31]}];
  for(const s of signs){if(month<s.end[0]||(month===s.end[0]&&day<=s.end[1]))return s;}
  return {sign:'Capricorn',symbol:'♑'};
}
function getLifePath(dob){
  const digits=dob.replace(/-/g,'').split('').map(Number);
  let sum=digits.reduce((a,b)=>a+b,0);
  while(sum>9&&![11,22,33].includes(sum)){sum=sum.toString().split('').map(Number).reduce((a,b)=>a+b,0);}
  return sum;
}
function getPersonalDay(dob,readingDate){
  const rd=new Date(readingDate),month=rd.getUTCMonth()+1,day=rd.getUTCDate(),year=rd.getUTCFullYear();
  const digits=(month+''+day+''+year).split('').map(Number);
  let sum=digits.reduce((a,b)=>a+b,0);
  while(sum>9&&![11,22].includes(sum)){sum=sum.toString().split('').map(Number).reduce((a,b)=>a+b,0);}
  return sum;
}
function formatDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function getMoonPhase(dateStr){
  const date=new Date(dateStr),known=new Date('2000-01-06'),diff=(date-known)/(1000*60*60*24),cycle=diff%29.53;
  if(cycle<1.85)return{phase:'New Moon',emoji:'🌑',energy:'intention-setting'};
  if(cycle<7.38)return{phase:'Waxing Crescent',emoji:'🌒',energy:'building momentum'};
  if(cycle<9.22)return{phase:'First Quarter',emoji:'🌓',energy:'decision and action'};
  if(cycle<14.77)return{phase:'Waxing Gibbous',emoji:'🌔',energy:'refinement'};
  if(cycle<16.61)return{phase:'Full Moon',emoji:'🌕',energy:'culmination and release'};
  if(cycle<22.15)return{phase:'Waning Gibbous',emoji:'🌖',energy:'gratitude and sharing'};
  if(cycle<23.99)return{phase:'Last Quarter',emoji:'🌗',energy:'forgiveness and letting go'};
  return{phase:'Waning Crescent',emoji:'🌘',energy:'rest and surrender'};
}
function getCompatibleSigns(sign){
  const compat={'Aries':['Leo','Sagittarius','Gemini'],'Taurus':['Virgo','Capricorn','Cancer'],'Gemini':['Libra','Aquarius','Aries'],'Cancer':['Scorpio','Pisces','Taurus'],'Leo':['Aries','Sagittarius','Gemini'],'Virgo':['Taurus','Capricorn','Cancer'],'Libra':['Gemini','Aquarius','Leo'],'Scorpio':['Cancer','Pisces','Virgo'],'Sagittarius':['Aries','Leo','Libra'],'Capricorn':['Taurus','Virgo','Scorpio'],'Aquarius':['Gemini','Libra','Sagittarius'],'Pisces':['Cancer','Scorpio','Capricorn']};
  return compat[sign]||['Leo','Libra','Aquarius'];
}

async function generateReading(){
  const name=document.getElementById('name').value.trim();
  const dob=document.getElementById('dob').value;
  const readingDate=document.getElementById('readingDate').value;
  const errorEl=document.getElementById('errorMsg');
  errorEl.classList.remove('visible');
  if(!name||!dob||!readingDate){errorEl.textContent='Please fill in all fields.';errorEl.classList.add('visible');return;}

  const btn=document.getElementById('generateBtn');
  btn.disabled=true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('output').classList.remove('visible');

  const zodiac=getZodiacSign(dob),lifePath=getLifePath(dob),personalDay=getPersonalDay(dob,readingDate),moon=getMoonPhase(readingDate),compatSigns=getCompatibleSigns(zodiac.sign),isPremium=selectedPlan==='premium';

  const systemPrompt=`You are the voice of Soulwrit — a premium astrology and numerology platform built on the idea that every soul carries a code, written in the stars and in numbers. Your tone is warm, perceptive, and quietly confident, like someone who genuinely sees the person reading it. Poetic but grounded, mystical but practical. Never use clichés like "the universe has a plan" or "trust the journey." Be specific, be honest, be worth reading.`;

  const userPrompt=`Generate a personalized daily reading for ${name}.

Their details:
- Sun sign: ${zodiac.sign}
- Life Path Number: ${lifePath}
- Personal Day Number: ${personalDay}
- Reading date: ${formatDate(readingDate)}
- Moon phase: ${moon.phase} (energy: ${moon.energy})
- Subscription: ${selectedPlan}${isPremium?' (include premium content)':''}

Return ONLY a valid JSON object with these exact fields:
{
  "headline": "A compelling one-sentence insight that feels specific to their sign and personal day — 15-20 words max",
  "horoscope": "A rich, personalized horoscope for ${zodiac.sign} today. 3-4 sentences. Reference planetary energy, the personal day number ${personalDay}, and give one concrete area of life to focus on. No clichés.",
  "numerologyTitle": "A short evocative title for their personal day ${personalDay} energy, 4-6 words",
  "numerologyText": "2-3 sentences explaining what personal day ${personalDay} means for ${name} today. Practical and specific.",
  "journalPrompt": "One focused journal question that connects their horoscope to their numerology energy. Genuinely thought-provoking, not generic.",
  "emailSubject": "A compelling email subject line, 6-10 words, no emojis"${isPremium?`,
  "moonRitual": "A short moon phase ritual or intention for the ${moon.phase}. 2-3 sentences, specific and actionable.",
  "compatibilityNote": "A brief compatibility insight for ${zodiac.sign} today. 2 sentences."`:''}
}

Return only the JSON. No preamble, no markdown, no explanation.`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:systemPrompt,messages:[{role:'user',content:userPrompt}]})
    });
    const data=await response.json();
    const rawText=data.content?.[0]?.text||'';
    const clean=rawText.replace(/```json|```/g,'').trim();
    const reading=JSON.parse(clean);
    renderReading(reading,{name,zodiac,lifePath,personalDay,moon,compatSigns,readingDate,isPremium});
  }catch(err){
    errorEl.textContent='Something went wrong generating the reading. Check your API connection and try again.';
    errorEl.classList.add('visible');
    console.error(err);
  }finally{
    btn.disabled=false;
    document.getElementById('loading').classList.remove('visible');
  }
}

function renderReading(r,ctx){
  const{name,zodiac,lifePath,personalDay,moon,compatSigns,isPremium}=ctx;
  const premiumHTML=isPremium?`
    <div class="premium-section">
      <span class="premium-badge-inline">✦ Premium</span>
      <div class="moon-block"><h4>${moon.emoji} ${moon.phase} — ${moon.energy}</h4><p>${r.moonRitual||''}</p></div>
      <div class="compatibility-block">
        <div class="compat-signs">${compatSigns.map(s=>`<span class="compat-pill">${s}</span>`).join('')}</div>
        <h4>Today's Compatibility Energy</h4><p>${r.compatibilityNote||''}</p>
      </div>
    </div>`:'';

  const emailHTML=`
    <div class="email-preview-card">
      <div class="email-preview-header"><div class="email-dot"></div><div><strong>Soulwrit</strong><span> · hello@soulwrit.ca · To: ${name}</span></div></div>
      <div class="email-body-preview">
        <div class="email-subject">${r.emailSubject||'Your reading for today'}</div>
        <p>Good morning, ${name}.</p><br/>
        <p><em>${zodiac.symbol} ${zodiac.sign} · Life Path ${lifePath} · Personal Day ${personalDay}</em></p><br/>
        <p><strong>${r.headline}</strong></p><br/>
        <p>${r.horoscope}</p><br/>
        <p><strong>Your numerology today: ${r.numerologyTitle}</strong></p>
        <p>${r.numerologyText}</p><br/>
        <p><strong>Today's journal prompt:</strong><br/><em>${r.journalPrompt}</em></p><br/>
        ${isPremium?`<p><strong>${moon.emoji} ${moon.phase} Ritual</strong><br/>${r.moonRitual||''}</p><br/>`:''}
        <p style="font-size:12px;color:#9C93B0;">— Soulwrit · Unsubscribe · View in browser</p>
      </div>
    </div>`;

  document.getElementById('output').innerHTML=`
    <div class="reading-card">
      <div class="reading-header">
        <div class="reading-meta">
          <span class="meta-pill">${zodiac.symbol} ${zodiac.sign}</span>
          <span class="meta-pill">Life Path ${lifePath}</span>
          <span class="meta-pill">Personal Day ${personalDay}</span>
          <span class="meta-pill">${moon.emoji} ${moon.phase}</span>
        </div>
        <h2>${r.headline}</h2>
      </div>
      <div class="reading-body">
        <p class="section-label">Horoscope</p>
        <p class="horoscope-text">${r.horoscope}</p>
        <p class="section-label">Numerology</p>
        <div class="numerology-block">
          <div class="num-badge">${personalDay}</div>
          <div class="num-content"><h4>${r.numerologyTitle}</h4><p>${r.numerologyText}</p></div>
        </div>
        <p class="section-label">Journal Prompt</p>
        <div class="journal-block"><div class="j-label">Reflect on this today</div><p>${r.journalPrompt}</p></div>
        ${premiumHTML}
      </div>
    </div>
    <p style="font-size:10.5px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Email Preview</p>
    ${emailHTML}
    <div class="action-row">
      <button class="btn-secondary" onclick="copyEmail()">Copy Email Text</button>
      <button class="btn-copy" onclick="generateReading()">✦ Regenerate</button>
    </div>`;
  document.getElementById('output').classList.add('visible');
  document.getElementById('output').scrollIntoView({behavior:'smooth',block:'start'});
}

function copyEmail(){
  const emailContent=document.querySelector('.email-body-preview')?.innerText||'';
  navigator.clipboard.writeText(emailContent).then(()=>{
    const btn=document.querySelector('.btn-secondary');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy Email Text',2000);
  });
}
</script>
</body>
</html>

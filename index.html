<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soulwrit — Your Soul's Code, Written Daily</title>

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --ink:#0B0912;
    --deep:#141020;
    --violet:#241B38;
    --violet-light:#332648;
    --gold:#D4AF6A;
    --gold-light:#F3D9A4;
    --gold-deep:#B8863E;
    --cream:#EDE8DC;
    --muted:#9C93B0;
    --border:rgba(212,175,106,0.18);
    --sage:#8FAE94;
  }
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--ink);
    color:var(--cream);
    line-height:1.6;
    overflow-x:hidden;
  }
  .serif{font-family:'Fraunces',serif;}

  /* THREAD LINE - signature element */
  .thread{
    position:absolute;
    left:50%;
    top:0;
    width:1px;
    height:100%;
    background:linear-gradient(to bottom, transparent, var(--border) 8%, var(--border) 92%, transparent);
    transform:translateX(-50%);
    z-index:0;
    pointer-events:none;
  }
  .thread-node{
    position:absolute;
    left:50%;
    transform:translate(-50%,-50%);
    width:8px;height:8px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 12px rgba(212,175,106,0.7);
    z-index:1;
  }

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;justify-content:space-between;align-items:center;
    padding:22px 48px;
    background:rgba(11,9,18,0.85);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo{
    font-family:'Fraunces',serif;font-style:italic;font-size:21px;font-weight:500;
    letter-spacing:0.03em;color:var(--gold-light);
  }
  .nav-right{display:flex;align-items:center;gap:22px;}
  .nav-login{
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--muted);
    text-decoration:none;transition:color 0.2s;
  }
  .nav-login:hover{color:var(--gold-light);}
